<style>
:root{--bg:#09090b;--c:#18181b;--c2:#1f1f23;--bd:#27272a;--t:#fafafa;--tm:#71717a;--ac:#6366f1;--fd:'Outfit','Noto Sans TC',sans-serif;--fb:'Outfit','Noto Sans TC',sans-serif}

.modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);animation:fadeIn .15s}
.modal-box{width:100%;max-width:500px;background:var(--bg);border-radius:24px 24px 0 0;padding:22px;padding-bottom:calc(env(safe-area-inset-bottom,16px)+22px);max-height:92vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.22,1,.36,1)}
.btn{padding:11px 18px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--fd);transition:all .15s;border:none}
.btn:disabled{opacity:.5;cursor:default}.btn.w{width:100%}
.btn.p{background:var(--ac);color:#fff}.btn.o{background:transparent;color:var(--t);border:2px solid var(--bd)}.btn.d{background:rgba(239,68,68,.06);color:#ef4444;border:2px solid rgba(239,68,68,.18)}
.btn.g{background:rgba(16,185,129,.06);color:#10b981;border:2px solid rgba(16,185,129,.18)}
.fl{margin-bottom:12px}.fl-lb{display:block;font-size:10px;font-weight:700;color:var(--tm);margin-bottom:4px;letter-spacing:.8px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 10px}

.chart-title{font-size:13px;font-weight:800;color:var(--t);font-family:var(--fd);margin-bottom:12px;display:flex;align-items:center;gap:6px}
canvas{width:100%!important;height:auto!important}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
(function(){
"use strict";
function h(tag,a){var el=document.createElement(tag),i,k,v,c;if(a)for(k in a){v=a[k];if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='cls')el.className=v;else if(k==='html')el.innerHTML=v;else if(k==='disabled'){if(v)el.setAttribute(k,'');else el.removeAttribute(k);}else if(v===false||v==null){el.removeAttribute(k);}else el.setAttribute(k,v);}for(i=2;i<arguments.length;i++){c=arguments[i];if(c==null||c===false)continue;if(Array.isArray(c))c.forEach(function(x){if(x)el.appendChild(typeof x==='string'||typeof x==='number'?document.createTextNode(x):x);});else el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);}return el;}

function sGet(k){try{var v=localStorage.getItem('ptf7-'+k);return v?JSON.parse(v):null;}catch(e){return null;}}

var CUR={TWD:'NT$',USD:'$',HKD:'HK$',JPY:'¥',EUR:'€',GBP:'£',CNY:'¥'};
function cs(c){return CUR[(c||'').toUpperCase()]||c||'$';}
function fmt(n,d){d=d||0;if(n==null||isNaN(n))return'—';return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fP(n){if(n==null||isNaN(n))return'—';return(n>=0?'+':'')+n.toFixed(2)+'%';}

function calc(s){var isShort=/空|short/i.test(s.direction),dir=isShort?-1:1,closed=/已平倉|closed/i.test(s.status),ref=closed&&s.exitPrice?s.exitPrice:s.currentPrice,cost=s.entryPrice*s.shares,pnl=dir*((ref||0)-s.entryPrice)*s.shares,pnlPct=cost>0?(pnl/cost)*100:0;return Object.assign({},s,{dir:dir,closed:closed,ref:ref,cost:cost,pnl:pnl,pnlPct:pnlPct});}
function pC(v){return v>0?'#ef4444':v<0?'#10b981':'var(--tm)';}

var ALIAS={'開倉日期':'openDate','日期':'openDate','代號 (Symbol)':'symbol','代號':'symbol','Symbol':'symbol','名稱':'name','公司名稱':'name','幣別':'currency','方向':'direction','狀態':'status','股數':'shares','持有股數':'shares','進場價':'entryPrice','買進均價':'entryPrice','出場價':'exitPrice','目前股價':'currentPrice','股價':'currentPrice','損益金額':'_pnl','報酬率 (%)':'_roi','報酬率':'_roi','備註':'note'};
function mapRow(row){var m={};Object.keys(row).forEach(function(k){var f=ALIAS[k.trim()];if(f&&f[0]!=='_')m[f]=row[k];});return{openDate:String(m.openDate||'').trim(),symbol:String(m.symbol||'').trim(),name:String(m.name||'').trim(),currency:String(m.currency||'USD').trim().toUpperCase(),direction:String(m.direction||'多').trim(),status:String(m.status||'持倉中').trim(),shares:parseFloat(m.shares)||0,entryPrice:parseFloat(m.entryPrice)||0,exitPrice:parseFloat(m.exitPrice)||0,currentPrice:parseFloat(m.currentPrice)||0,note:String(m.note||'').trim()};}
function toSheet(s){var d=calc(s);return{'開倉日期':s.openDate,'代號 (Symbol)':s.symbol,'名稱':s.name,'幣別':s.currency,'方向':s.direction,'狀態':s.status,'股數':s.shares,'進場價':s.entryPrice,'出場價':s.exitPrice||'','目前股價':s.currentPrice,'損益金額':Math.round(d.pnl*100)/100,'報酬率 (%)':Math.round(d.pnlPct*100)/100,'備註':s.note||''};}

var stocks=sGet('data')||[],config=sGet('config')||{apiUrl:''},history=sGet('history')||[];
var tab='all',sortBy='pnlPct',sortDesc=true,search='',syncing=false,lastSync=null,openCards={},showCharts=false;

function saveStocks(ns){stocks=ns;sSet('data',ns);render();}
function saveConfig(nc){config=nc;sSet('config',nc);}

var toastT;
function toast(msg,type){type=type||'info';clearTimeout(toastT);var old=document.querySelector('.toast');if(old)old.remove();var bg={success:'#10b981',error:'#ef4444',info:'#6366f1',warn:'#f59e0b'};var t=h('div',{cls:'toast',style:{background:bg[type]||bg.info}},msg);document.body.appendChild(t);toastT=setTimeout(function(){t.remove();},4000);}

function cloudGet(url){return fetch(url,{redirect:'follow'}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}
function cloudPost(url,body){return fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}

function pullCloud(){if(!config.apiUrl){toast('請先設定','error');showSettings();return;}syncing=true;render();cloudGet(config.apiUrl).then(function(r){if(!r.success)throw new Error(r.error);var mapped=(r.data||[]).map(function(row,i){var m=mapRow(row);m.id=Date.now()+i;return m;}).filter(function(s){return s.symbol;});saveStocks(mapped);lastSync=new Date();toast('☁️ 同步成功！'+mapped.length+' 筆','success');}).catch(function(e){toast('同步失敗: '+e.message,'error');}).finally(function(){syncing=false;render();});}

function pushCloud(){if(!config.apiUrl){toast('請先設定','error');return;}if(!stocks.length){toast('沒有資料','error');return;}syncing=true;render();cloudPost(config.apiUrl,{action:'overwrite',rows:stocks.map(toSheet)}).then(function(r){if(!r.success)throw new Error(r.error);toast('☁️ 已寫回 '+stocks.length+' 筆','success');}).catch(function(e){toast('寫回失敗: '+e.message,'error');}).finally(function(){syncing=false;render();});}

// ═══ 即時股價更新 ═══
function updatePrices(){
  if(!config.apiUrl){toast('請先設定','error');return;}
  syncing=true;render();
  cloudPost(config.apiUrl,{action:'updatePrices'}).then(function(r){
    if(!r.success) throw new Error(r.error);
    // 更新本地資料
    if(r.prices&&r.prices.length>0){
      var pm={};r.prices.forEach(function(p){if(p.success)pm[p.symbol]=p.price;});
      stocks.forEach(function(s){if(pm[s.symbol])s.currentPrice=pm[s.symbol];});
      saveStocks(stocks);
    }
    toast('📡 已更新 '+(r.updated||0)+' 檔即時股價','success');
    // 拉取歷史
    fetchHistory();
  }).catch(function(e){toast('股價更新失敗: '+e.message,'error');}).finally(function(){syncing=false;render();});
}

// ═══ 拉取損益歷史 ═══
function fetchHistory(){
  if(!config.apiUrl) return;
  cloudGet(config.apiUrl+'?action=history').then(function(r){
    if(r.success&&r.history){history=r.history;sSet('history',history);render();}
  }).catch(function(){});
}

// ═══ Modals ═══
var curModal=null;
function closeModal(){if(curModal){curModal.remove();curModal=null;}}
function showModal(title,contentEl){closeModal();var ov=h('div',{cls:'modal-overlay'},h('div',{cls:'modal-box',onClick:function(e){e.stopPropagation();}},h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}},h('span',{style:{fontSize:'18px',fontWeight:'800',color:'var(--t)',fontFamily:'var(--fd)'}},title),h('button',{style:{background:'var(--c2)',border:'none',borderRadius:'10px',width:'36px',height:'36px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--tm)',cursor:'pointer',fontSize:'18px'},onClick:closeModal},'✕')),contentEl));ov.addEventListener('click',function(e){if(e.target===ov)closeModal();});document.body.appendChild(ov);curModal=ov;}

function mkField(label,val,onChange,opts){opts=opts||{};var wrap=h('div',{cls:'fl'});wrap.appendChild(h('label',{cls:'fl-lb'},label+(opts.required?' *':'')));if(opts.options){var sel=h('select',{cls:'fl-sl'});opts.options.forEach(function(o){var ov=typeof o==='object'?o.value:o,ol=typeof o==='object'?o.label:o;var opt=h('option',{value:ov},ol);if(ov===val)opt.selected=true;sel.appendChild(opt);});sel.addEventListener('change',function(e){onChange(e.target.value);});wrap.appendChild(sel);}else{var inp=h('input',{cls:'fl-in'+(opts.mono?' mono':''),type:opts.type||'text',value:val||'',placeholder:opts.placeholder||''});inp.addEventListener('input',function(e){onChange(e.target.value);});wrap.appendChild(inp);}return wrap;}

function showStockForm(stock){var f=stock?Object.assign({},stock):{openDate:new Date().toISOString().slice(0,10),symbol:'',name:'',currency:'USD',direction:'多',status:'持倉中',shares:'',entryPrice:'',exitPrice:'',currentPrice:'',note:''};function set(k,v){f[k]=v;}showModal(stock?'編輯部位':'新增部位',h('div',null,h('div',{cls:'g2'},mkField('開倉日期',f.openDate,function(v){set('openDate',v);},{type:'date'}),mkField('代號 (Symbol)',f.symbol,function(v){set('symbol',v);},{placeholder:'AAPL / 2330',required:true})),mkField('名稱',f.name,function(v){set('name',v);},{placeholder:'Apple Inc.'}),h('div',{cls:'g3'},mkField('幣別',f.currency,function(v){set('currency',v);},{options:['USD','TWD','HKD','JPY','EUR','GBP','CNY']}),mkField('方向',f.direction,function(v){set('direction',v);},{options:[{value:'多',label:'做多'},{value:'空',label:'做空'}]}),mkField('狀態',f.status,function(v){set('status',v);},{options:[{value:'持倉中',label:'持倉中'},{value:'已平倉',label:'已平倉'}]})),h('div',{cls:'g2'},mkField('股數',f.shares,function(v){set('shares',v);},{type:'number',placeholder:'0',required:true}),mkField('進場價',f.entryPrice,function(v){set('entryPrice',v);},{type:'number',placeholder:'0',required:true})),h('div',{cls:'g2'},mkField('出場價',f.exitPrice,function(v){set('exitPrice',v);},{type:'number',placeholder:'平倉才需填'}),mkField('目前股價',f.currentPrice,function(v){set('currentPrice',v);},{type:'number',placeholder:'0'})),mkField('備註',f.note,function(v){set('note',v);},{placeholder:'策略、理由...'}),h('button',{cls:'btn p w',style:{marginTop:'4px'},onClick:function(){if(!f.symbol||!f.shares||!f.entryPrice)return;var s=Object.assign({},f,{shares:+f.shares||0,entryPrice:+f.entryPrice||0,exitPrice:+f.exitPrice||0,currentPrice:+f.currentPrice||0,id:f.id||Date.now()});if(stock)saveStocks(stocks.map(function(st){return st.id===s.id?s:st;}));else saveStocks(stocks.concat([s]));closeModal();}},stock?'儲存變更':'新增部位')));}

function showSettings(){var c=Object.assign({},config);var testBox=h('div');showModal('☁️ 雲端連線設定',h('div',null,h('div',{style:{background:'var(--c2)',borderRadius:'14px',padding:'14px 16px',marginBottom:'18px',border:'1px solid var(--bd)',fontSize:'12px',color:'var(--tm)',lineHeight:'1.9'}},h('div',{style:{fontWeight:'800',color:'var(--t)',marginBottom:'6px',fontSize:'13px'}},'設定步驟'),['1|Apps Script 貼上新版程式碼（v2）','2|修改 SHEET_ID','3|部署 → 管理部署 → 新版本 → 部署','4|複製網址貼到下方'].map(function(s){var p=s.split('|');return h('div',{style:{display:'flex',gap:'8px',alignItems:'flex-start',marginBottom:'4px'}},h('span',{style:{background:'var(--ac)',color:'#fff',borderRadius:'6px',padding:'1px 7px',fontSize:'11px',fontWeight:'800'}},p[0]),h('span',null,p[1]));})),mkField('Apps Script Web App 網址',c.apiUrl||'',function(v){c.apiUrl=v;},{placeholder:'https://script.google.com/macros/s/...',mono:true}),testBox,h('div',{style:{display:'flex',gap:'8px',marginTop:'4px'}},h('button',{cls:'btn o w',style:{fontSize:'13px'},onClick:function(){if(!c.apiUrl)return;testBox.innerHTML='';testBox.appendChild(h('div',{style:{padding:'10px',borderRadius:'10px',marginBottom:'12px',background:'var(--c2)',border:'1px solid var(--bd)',fontSize:'13px',fontWeight:'700',color:'var(--tm)'}},'測試中...'));cloudGet(c.apiUrl).then(function(r){testBox.innerHTML='';testBox.appendChild(h('div',{style:{padding:'10px',borderRadius:'10px',marginBottom:'12px',background:r.success?'rgba(16,185,129,.08)':'rgba(239,68,68,.08)',border:'1px solid '+(r.success?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'),fontSize:'13px',fontWeight:'700',color:r.success?'#10b981':'#ef4444'}},r.success?'✓ 成功！'+( r.count||0)+' 筆':'✕ '+(r.error||'錯誤')));}).catch(function(e){testBox.innerHTML='';testBox.appendChild(h('div',{style:{padding:'10px',borderRadius:'10px',marginBottom:'12px',background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',fontSize:'13px',fontWeight:'700',color:'#ef4444'}},'✕ '+e.message));});}},'🔗 測試'),h('button',{cls:'btn p w',style:{fontSize:'13px'},onClick:function(){saveConfig(c);closeModal();toast('已儲存','success');render();}},'儲存'))));}

// CHARTS
// ═══════════════════════════════════════
var COLORS=['#6366f1','#f59e0b','#10b981','#ef4444','#06b6d4','#ec4899','#8b5cf6','#14b8a6','#f97316','#64748b'];

function drawPnlBar(container){
  var enriched=stocks.map(calc).filter(function(s){return!s.closed;}).sort(function(a,b){return b.pnl-a.pnl;});
  if(!enriched.length) return;
  var barH=28,gap=6,pad={t:10,b:10,l:80,r:50};
  var cH=pad.t+pad.b+enriched.length*(barH+gap);
  var canvas=h('canvas',{width:480,height:cH});
  canvas.style.width='100%';canvas.style.height=cH+'px';
  container.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  canvas.width=480*dpr;canvas.height=cH*dpr;
  ctx.scale(dpr,dpr);
  var maxAbs=Math.max.apply(null,enriched.map(function(s){return Math.abs(s.pnl);}))||1;
  var barW=480-pad.l-pad.r;
  var mid=pad.l+barW/2;

  enriched.forEach(function(s,i){
    var y=pad.t+i*(barH+gap);
    var w=(Math.abs(s.pnl)/maxAbs)*(barW/2);
    var x=s.pnl>=0?mid:mid-w;
    ctx.fillStyle=s.pnl>=0?'#ef4444':'#10b981';
    ctx.beginPath();
    var r=4;
    if(w>r*2){ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+barH-r);ctx.quadraticCurveTo(x+w,y+barH,x+w-r,y+barH);ctx.lineTo(x+r,y+barH);ctx.quadraticCurveTo(x,y+barH,x,y+barH-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);}else{ctx.rect(x,y,w,barH);}
    ctx.fill();
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--t').trim()||'#fafafa';
    ctx.font='bold 11px Outfit,Noto Sans TC,sans-serif';
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(s.symbol,pad.l-6,y+barH/2);
    ctx.textAlign=s.pnl>=0?'left':'right';
    ctx.font='bold 10px Outfit,sans-serif';
    ctx.fillStyle=s.pnl>=0?'#ef4444':'#10b981';
    var tx=s.pnl>=0?x+w+4:x-4;
    ctx.fillText((s.pnl>=0?'+':'')+fmt(Math.round(s.pnl)),tx,y+barH/2);
  });
  // zero line
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--bd').trim()||'#27272a';
  ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mid,pad.t-4);ctx.lineTo(mid,cH-pad.b+4);ctx.stroke();
}

function drawPieChart(container){
  var enriched=stocks.map(calc).filter(function(s){return!s.closed&&s.cost>0;});
  if(!enriched.length) return;
  var total=enriched.reduce(function(a,s){return a+Math.abs(s.cost);},0);
  var canvas=h('canvas',{width:480,height:220});
  canvas.style.width='100%';canvas.style.height='220px';
  container.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  canvas.width=480*dpr;canvas.height=220*dpr;ctx.scale(dpr,dpr);

  var cx=120,cy=110,r=85;
  var angle=-Math.PI/2;
  enriched.sort(function(a,b){return b.cost-a.cost;});
  var slices=[];
  enriched.forEach(function(s,i){
    var pct=Math.abs(s.cost)/total;
    var start=angle;angle+=pct*2*Math.PI;
    slices.push({s:s,pct:pct,start:start,end:angle,color:COLORS[i%COLORS.length]});
  });

  slices.forEach(function(sl){
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sl.start,sl.end);ctx.closePath();
    ctx.fillStyle=sl.color;ctx.fill();
    ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--c').trim()||'#18181b';
    ctx.lineWidth=2;ctx.stroke();
  });
  ctx.beginPath();ctx.arc(cx,cy,45,0,Math.PI*2);
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--c').trim()||'#18181b';ctx.fill();

  // Legend
  var lx=250,ly=20;
  ctx.font='bold 12px Outfit,Noto Sans TC,sans-serif';
  slices.forEach(function(sl,i){
    if(i>8) return;
    var y=ly+i*22;
    ctx.fillStyle=sl.color;
    ctx.beginPath();ctx.arc(lx,y+1,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--t').trim()||'#fafafa';

function drawLineChart(container){
  if(!history||history.length<2) {
    container.appendChild(h('div',{style:{padding:'20px',textAlign:'center',color:'var(--tm)',fontSize:'12px'}},'需要至少 2 天的歷史資料才能顯示走勢圖。每次「更新股價」會自動記錄當日損益。'));
    return;
  }
  var data=history.slice(-30); // 最近30天
  var canvas=h('canvas',{width:480,height:200});
  canvas.style.width='100%';canvas.style.height='200px';
  container.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  canvas.width=480*dpr;canvas.height=200*dpr;ctx.scale(dpr,dpr);

  var pad={t:20,b:30,l:60,r:20};
  var w=480-pad.l-pad.r,ht=200-pad.t-pad.b;
  var vals=data.map(function(d){return d.pnl;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  if(mn===mx){mn-=100;mx+=100;}
  var range=mx-mn;

  function xPos(i){return pad.l+(i/(data.length-1))*w;}
  function yPos(v){return pad.t+ht-(((v-mn)/range)*ht);}

  // Grid
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--bd').trim()||'#27272a';
  ctx.lineWidth=0.5;
  for(var g=0;g<5;g++){
    var gy=pad.t+(ht/4)*g;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(480-pad.r,gy);ctx.stroke();
    var gv=mx-((g/4)*range);
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--tm').trim()||'#71717a';
    ctx.font='600 9px Outfit,sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(fmt(Math.round(gv)),pad.l-8,gy);
  }

  // Zero line
  if(mn<0&&mx>0){
    var zy=yPos(0);
    ctx.strokeStyle='rgba(99,102,241,.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pad.l,zy);ctx.lineTo(480-pad.r,zy);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Fill gradient
  ctx.beginPath();ctx.moveTo(xPos(0),yPos(vals[0]));
  for(var i=1;i<data.length;i++) ctx.lineTo(xPos(i),yPos(vals[i]));
  ctx.lineTo(xPos(data.length-1),pad.t+ht);ctx.lineTo(xPos(0),pad.t+ht);ctx.closePath();
  var grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ht);
  var lastV=vals[vals.length-1];
  if(lastV>=0){grad.addColorStop(0,'rgba(239,68,68,.15)');grad.addColorStop(1,'rgba(239,68,68,0)');}
  else{grad.addColorStop(0,'rgba(16,185,129,0)');grad.addColorStop(1,'rgba(16,185,129,.15)');}
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();ctx.moveTo(xPos(0),yPos(vals[0]));
  for(var j=1;j<data.length;j++) ctx.lineTo(xPos(j),yPos(vals[j]));
  ctx.strokeStyle=lastV>=0?'#ef4444':'#10b981';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();

  // Dots on first/last
  [0,data.length-1].forEach(function(idx){
    ctx.beginPath();ctx.arc(xPos(idx),yPos(vals[idx]),4,0,Math.PI*2);
    ctx.fillStyle=lastV>=0?'#ef4444':'#10b981';ctx.fill();
    ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--c').trim()||'#18181b';ctx.lineWidth=2;ctx.stroke();
  });

  // X labels
  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--tm').trim()||'#71717a';
  ctx.font='600 9px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  [0,Math.floor(data.length/2),data.length-1].forEach(function(idx){
    if(idx<data.length) ctx.fillText(data[idx].date.slice(5),xPos(idx),pad.t+ht+8);
  });
}
